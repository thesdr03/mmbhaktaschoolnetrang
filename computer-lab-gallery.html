<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Computer Lab Gallery - Smt. M.M. Bhakta High School</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <style>* { font-family: 'Poppins', sans-serif; } html { scroll-behavior: smooth; }</style>
</head>
<body class="bg-gradient-to-b from-sky-50 to-white">
  <div class="bg-sky-700 text-white py-4 px-4 shadow-lg">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <h1 class="text-3xl font-bold">💻 Computer Lab Gallery</h1>
      <a href="javascript:history.back()" class="bg-white text-sky-700 px-4 py-2 rounded-full font-medium hover:bg-gray-100 transition-colors">← Back</a>
    </div>
  </div>
  <div class="max-w-7xl mx-auto px-4 py-12">
    <div class="text-center mb-12">
      <h2 class="text-3xl md:text-4xl font-bold text-gray-800 mb-2">Computer Lab Activities</h2>
      <p class="text-gray-600 text-lg">Practical sessions, coding clubs and IT events</p>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      ${Array.from({length:12}).map((_,i)=>`
      <div class="group relative overflow-hidden rounded-2xl shadow-lg hover:shadow-2xl transition-all duration-300">
        <a href="https://via.placeholder.com/600x400?text=Computer+Lab+${i+1}" target="_blank" rel="noopener noreferrer">
          <img src="https://via.placeholder.com/600x400?text=Computer+Lab+${i+1}" alt="Computer Lab ${i+1}" class="w-full h-64 object-cover group-hover:scale-110 transition-transform duration-300">
          <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-40 transition-all duration-300 flex items-center justify-center">
            <span class="text-white text-lg font-semibold opacity-0 group-hover:opacity-100">Computer Lab ${i+1}</span>
          </div>
        </a>
      </div>
      `).join('')}
    </div>
  </div>
  <div class="bg-gray-800 text-white py-8 mt-16 text-center"><p>&copy; 2024 Smt. M.M. Bhakta High School, Netrang. Computer Lab Gallery</p></div>
</body>
</html>
